site_name: Lang Ya Shuai Notes
site_url: https://shuai-notes.vercel.app/
site_author: Lang Ya Shuai
site_description: Lang Ya Shuai Notes.

repo_url: https://github.com/zhouushe/notes

theme:
  name: mkdocs
  highlightjs: true
  include_search_page: false
  search_index_only: true

nav:
  - Home: index.md
  - Notes:
      - Jenkins Notes: jenkins.md

markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.superfences
  - fenced_code
  - tables
  - footnotes
  - meta
  - attr_list

plugins:
  - search
